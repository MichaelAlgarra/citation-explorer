<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- soft rounded background -->
  <rect width="64" height="64" rx="14" fill="#171a21"/>
  <!-- sheet of paper with a folded top-right corner -->
  <g transform="translate(16 12)">
    <path d="M2 3 h22 l8 8 v39 a3 3 0 0 1 -3 3 H2 a3 3 0 0 1 -3 -3 V6 a3 3 0 0 1 3 -3 Z"
          fill="#f5f7fb" stroke="#c9d0dc" stroke-width="1.5"/>
    <!-- folded corner -->
    <path d="M24 3 l8 8 h-8 Z" fill="#d7dde8"/>
    <!-- smiley face: two black dot eyes + a curved smile -->
    <circle cx="10" cy="24" r="2.4" fill="#12141a"/>
    <circle cx="21" cy="24" r="2.4" fill="#12141a"/>
    <path d="M9 31 q6.5 6 13 0" fill="none" stroke="#12141a"
          stroke-width="2.4" stroke-linecap="round"/>
  </g>
</svg>
